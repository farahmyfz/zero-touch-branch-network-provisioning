global:
  scrape_interval: 15s # Ambil data setiap 15 detik

scrape_configs:
  - job_name: 'mikrotik_snmp'
    static_configs:
      - targets:
        - 192.168.10.1  # IP Router 1
        - 192.168.20.1  # IP Router 2 
    metrics_path: /snmp
    params:
      module: [if_mib]  # Modul standar untuk membaca trafik port/interface
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116  # Melempar tugas ke SNMP Exporter
